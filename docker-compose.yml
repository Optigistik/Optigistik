services:
  site_vitrine:
    build: ./site_vitrine
    container_name: site_vitrine
    ports:
      - "3000:3000"
    restart: always

  logiciel:
    build: ./logiciel
    container_name: logiciel
    ports:
      - "3001:3000"
    restart: always

  solveur:
    build: ./solveur
    container_name: solveur
    ports:
      - "8000:8000"
    restart: always